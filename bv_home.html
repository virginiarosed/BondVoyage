<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BondVoyage │ Home</title>
    <link rel="stylesheet" href="bv_home.css">
    <link rel="icon" href="favicon-32x32.png" type="image/png">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <img src="bv_logo.png" alt="Logo" class="logo-img">
            </div>
            <ul class="menu">
                <li class="active">
                    <a href="bv_home.html">
                        <img src="bv_home.png" alt="Home Icon"><span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="bv_travel.html">
                        <img src="bv_travel.png" alt="Travel Icon"><span>Travel</span>
                    </a>
                </li>
                <li>
                    <a href="bv_weather.html">
                        <img src="bv_weather.png" alt="Weather Icon"><span>Weather</span>
                    </a>
                </li>
                <li>
                    <a href="bv_translate.html">
                        <img src="bv_translate.png" alt="Translate Icon"><span>Translate</span>
                    </a>
                </li>
                <li>
                    <a href="bv_more.html">
                        <img src="bv_more.png" alt="More Icon"><span>More</span>
                    </a>
                </li>
            </ul>            
        </nav>
        <main class="content">
            <img src="welcome_title.png" alt="Welcome Title" class="welcome-img">
            <div class="profile-container">
                <div class="profile-left">
                    <img src="bv_userprofile.png" alt="User Profile" class="profile-img">
                </div>

                <!-- Will modify this to display the user's data -->
                <div class="profile-right">
                    <p class="profile-name">User Name</p>
                    <p class="profile-email">email@gmail.com</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get the current URL path
            const currentPath = window.location.pathname;

            // Select all <a> elements in the sidebar
            const menuLinks = document.querySelectorAll('.menu a');

            // Loop through the links and compare their href with the current path
            menuLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    // Add the active class to the parent <li>
                    link.parentElement.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
